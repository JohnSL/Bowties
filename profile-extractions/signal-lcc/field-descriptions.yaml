nodeType:
  manufacturer: "RR-CirKits, Inc."
  model: "Signal-LCC"

fields:
  # =========================================================================
  # Segment: Node ID
  # =========================================================================
  - cdiPath: "Node ID/Your name and description for this node/Node Name"
    name: "Node Name"
    elementType: "string"
    description: |
      Human-readable **name** for this Signal-LCC, shown in the node-selection
      window of configuration tools such as JMRI. Pick a short, location-anchored
      label (for example *"Whitehead East — Masts 101L/102L"*) so you can find
      this node quickly on a layout that has many.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 63
    citation: "Manual Section 6.2 NODE ID, page 20."

  - cdiPath: "Node ID/Your name and description for this node/Node Description"
    name: "Node Description"
    elementType: "string"
    description: |
      Longer **description** for this Signal-LCC. The manual recommends recording
      the masts, lines, or signal locations this node controls so future
      maintenance does not require chasing wiring back to find the board.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 64
    citation: "Manual Section 6.2 NODE ID, page 20."

  # =========================================================================
  # Segment: Node Power Monitor
  # =========================================================================
  - cdiPath: "Node Power Monitor/Message Options"
    name: "Message Options"
    elementType: "int"
    description: |
      Chooses which **power-state producer events** this node emits onto the LCC
      bus. Use *Send Power OK only* when downstream logic just needs to know the
      node is alive again after a brownout, or *Send both* to also broadcast
      power-loss notifications (these may be lost if the node dies before it
      can transmit them).
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "No power-state events are produced. Use this if no other node needs to react to power events from this Signal-LCC."
        category: null
      - value: 1
        label: "Send Power OK only"
        description: "The node produces its **Power OK** event when power is good (typically after startup or recovery from a brownout)."
        category: null
      - value: 2
        label: "Send both Power OK and Power Not OK"
        description: "Produces both events. **Power Not OK** is best-effort — it may not arrive if the node loses power before it can transmit."
        category: null
    citation: "CDI segment 'Node Power Monitor' map."

  - cdiPath: "Node Power Monitor/Power OK"
    name: "Power OK"
    elementType: "eventid"
    description: |
      Producer event sent by this node when its **power is good** (for example
      after a clean startup or after recovery from a power dip). Assign an
      EventID that other nodes or layout logic can consume to know this
      Signal-LCC is online. Only emitted when **Message Options** is *Send
      Power OK only* or *Send both Power OK and Power Not OK*.
    units: null
    validRange: null
    typicalValues: null
    role: "Producer"
    citation: "CDI field description: 'EventID'. Event-role classification: producer (Node Power Monitor segment)."

  - cdiPath: "Node Power Monitor/Power Not OK"
    name: "Power Not OK"
    elementType: "eventid"
    description: |
      Producer event sent by this node when its **power has failed**. This is
      best-effort: if the node loses power before it can put the frame on the
      bus, the event will not be delivered. Only emitted when **Message
      Options** is *Send both Power OK and Power Not OK*.
    units: null
    validRange: null
    typicalValues: null
    role: "Producer"
    citation: "CDI field description: 'EventID (may be lost)'. Event-role classification: producer (Node Power Monitor segment)."

  # =========================================================================
  # Segment: Port I/O-1  (Line group, replication=8)
  # =========================================================================
  - cdiPath: "Port I/O-1/Line/Line Description"
    name: "Line Description"
    elementType: "string"
    description: |
      Free-form label for **what is wired to this I/O line** — for example
      *"Block 12 BOD"*, *"Yard ladder push-button"*, or *"Switch 7 motor"*.
      Used by configuration tools as a friendly identifier and shown in tabs.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 32
    citation: "Manual Section 6.3.1 Lines, page 21."

  - cdiPath: "Port I/O-1/Line/Output Function"
    name: "Output Function"
    elementType: "int"
    description: |
      Selects how this line **drives its output** when commanded. Choose *None*
      if the line is unused as an output (it may still be an input). The four
      active modes pair with the polarity field directly below to choose
      whether the active state is High or Low. Pulse mode uses Delay Interval
      timing; Blink A / Blink B share the same blink generator so multiple
      lines can flash in or out of phase.

      **Safety note:** any non-*None* **Input Function** value overrides
      Output Function, so set Input Function to *None* before relying on this
      line as an output.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "Line is not driven as an output. Use this for input-only lines or unused pins."
        category: null
      - value: 1
        label: "Steady"
        description: "Line is held continuously in the active state (Low or High per polarity) while commanded On."
        category: "Steady"
      - value: 2
        label: "Pulse"
        description: "Line briefly pulses to the active state when commanded On; timing is set by **Delay** Interval 1 (and Interval 2 for pulse width)."
        category: "Pulse"
      - value: 3
        label: "Blink A"
        description: "Line blinks continuously while commanded On, using the global **A-phase** rate. Pair with **B-phase** on another line for alternating flashes."
        category: "Blink"
      - value: 4
        label: "Blink B"
        description: "Line blinks continuously while commanded On, on the opposite phase from Blink A so the two flash in alternation."
        category: "Blink"
    citation: "Manual Section 6.3.2 I/O Configuration, page 22."

  - cdiPath: "Port I/O-1/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
    name: "Output polarity"
    elementType: "int"
    description: |
      Polarity used when the line is **driven as an output**. *Low (0V)* makes
      the active state pull the line to ground (use this for most LEDs and
      relays wired between V+ and the line). *High (5V)* makes the active state
      drive 5V (use this when sinking through external NPN drivers).

      Has no effect when **Output Function** is *None*, or when **Input
      Function** is enabled (input always wins).
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Low  (0V)"
        description: "Active state pulls the line to 0V. Common for direct-driven LEDs and many relays."
        category: null
      - value: 1
        label: "High (5V)"
        description: "Active state drives the line to 5V. Use with external drivers that expect a logic-high signal."
        category: null
    citation: "Manual Section 6.3.2 I/O Configuration, page 22. Relevance rules R002, R005."

  - cdiPath: "Port I/O-1/Line/Input Function"
    name: "Input Function"
    elementType: "int"
    description: |
      Selects how this line is **read as an input**. *Normal* sends the matching
      indication each time the input edge occurs in the configured polarity.
      *Alternating* toggles between sending the On and Off indicator on each
      successive input event, useful for momentary push-buttons that should
      flip a state.

      **Safety note:** when this field is anything other than *None*, the line
      is forced to act as an input and any Output Function is overridden.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "Line is not read as an input. Use this to free the line for output duty."
        category: null
      - value: 1
        label: "Normal"
        description: "Each input edge in the active polarity drives the configured indicator event."
        category: null
      - value: 2
        label: "Alternating"
        description: "Successive input events toggle between sending On and Off indicators, useful for momentary panel buttons."
        category: null
    citation: "Manual Section 6.3.2 I/O Configuration, page 22. Relevance rule R004 (overrides Output Function)."

  - cdiPath: "Port I/O-1/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
    name: "Input polarity"
    elementType: "int"
    description: |
      Voltage at which this line **fires its indication** when read as an input.
      *Low (0V)* is the typical setting for block-occupancy detectors and
      grounded push-buttons; *High (5V)* matches sensors that pull the line up
      when active.

      Has no effect when **Input Function** is *None*.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Low  (0V)"
        description: "Indication fires when the line is pulled to 0V (typical for grounded buttons and most BOD outputs)."
        category: null
      - value: 1
        label: "High (5V)"
        description: "Indication fires when the line is driven to 5V."
        category: null
    citation: "Manual Section 6.3.2 I/O Configuration, page 22. Relevance rule R003."

  # ----- Port I/O-1/Line/Delay (replication=2) -----
  - cdiPath: "Port I/O-1/Line/Delay/Delay Time (1-60000)"
    name: "Delay Time (1-60000)"
    elementType: "int"
    description: |
      Length of this delay interval. **Interval 1** acts as the on-delay or
      pulse pre-delay; **Interval 2** acts as the off-delay or pulse width.
      For input debounce both intervals are read in Milliseconds.
    units: "selected by Units field"
    validRange:
      min: 1
      max: 60000
    typicalValues: null
    citation: "Manual Section 6.3.3 Delay, page 23."

  - cdiPath: "Port I/O-1/Line/Delay/Units"
    name: "Units"
    elementType: "int"
    description: |
      Time unit applied to **Delay Time** for this interval. Choose the largest
      unit that still gives the resolution you need — using Seconds or Minutes
      keeps the timer free for very long delays (up to 60,000 minutes ≈ 41
      days).
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Milliseconds"
        description: "Delay Time is interpreted as milliseconds (1 ms – 60 s)."
        category: null
      - value: 1
        label: "Seconds"
        description: "Delay Time is interpreted as seconds (1 s – 60,000 s ≈ 16.7 h)."
        category: null
      - value: 2
        label: "Minutes"
        description: "Delay Time is interpreted as minutes (1 min – 60,000 min ≈ 41 days)."
        category: null
    citation: "Manual Section 6.3.3 Delay, page 23."

  - cdiPath: "Port I/O-1/Line/Delay/Retrigger"
    name: "Retrigger"
    elementType: "int"
    description: |
      Controls what happens when a **new event arrives before the timer
      finishes**. *Yes* restarts the count from zero (handy for re-arming a
      debounce or extending an approach-light timer). *No* lets the original
      delay complete and ignores the new event. For input debounce, retrigger
      is always treated as Yes regardless of this setting.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "No"
        description: "Once the timer starts, new events are ignored until it expires."
        category: null
      - value: 1
        label: "Yes"
        description: "Every matching event restarts the timer from zero."
        category: null
    citation: "Manual Section 6.3.3 Delay, page 23."

  # ----- Port I/O-1/Line/Commands/Consumers (replication=6) -----
  - cdiPath: "Port I/O-1/Line/Commands/Consumers/Command"
    name: "Command"
    elementType: "eventid"
    description: |
      Consumer EventID that this Signal-LCC **listens for** to drive the line.
      Bind it to a panel-button event, a JMRI sensor, or another node's
      producer event. The paired **Action** field controls exactly how the
      line reacts. Up to 6 command slots per line, so the same physical line
      can respond to several different bus events.
    units: null
    validRange: null
    typicalValues: null
    role: "Consumer"
    citation: "Manual Section 6.3.4 Commands, page 23. Relevance rule R001 disables the whole Commands group when Output Function is None."

  - cdiPath: "Port I/O-1/Line/Commands/Consumers/Action"
    name: "Action"
    elementType: "int"
    description: |
      How the line reacts when its **Command** event arrives. *On / Off /
      Toggle* are the everyday choices. *Veto On / Veto Off* set an internal
      veto register that **Gated** actions consult — a Gated On only drives the
      line if the veto register is Off, allowing a manual override to suppress
      automated control without unbinding events.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "Slot is unused — the Command event is ignored."
        category: null
      - value: 1
        label: "On  (Line Active)"
        description: "Drive the line to its active state."
        category: "Direct"
      - value: 2
        label: "Off (Line Inactive)"
        description: "Drive the line to its inactive state."
        category: "Direct"
      - value: 3
        label: "Change (Toggle)"
        description: "Flip the line to the opposite state."
        category: "Direct"
      - value: 4
        label: "Veto On  (Active)"
        description: "Set the internal veto register **active**, blocking subsequent *Gated* commands until cleared."
        category: "Veto"
      - value: 5
        label: "Veto Off (Inactive)"
        description: "Clear the internal veto register, allowing *Gated* commands to take effect."
        category: "Veto"
      - value: 6
        label: "Gated On  (Non Veto Output)"
        description: "Drive the line On **only if** the veto register is currently inactive."
        category: "Gated"
      - value: 7
        label: "Gated Off (Non Veto Output)"
        description: "Drive the line Off **only if** the veto register is currently inactive."
        category: "Gated"
      - value: 8
        label: "Gated Change (Non Veto Toggle)"
        description: "Toggle the line **only if** the veto register is currently inactive."
        category: "Gated"
    citation: "Manual Section 6.3.4 Commands, pages 23–24."

  # ----- Port I/O-1/Line/Actions/Producers (replication=6) -----
  - cdiPath: "Port I/O-1/Line/Actions/Producers/Upon this action"
    name: "Upon this action"
    elementType: "int"
    description: |
      Selects **which line event triggers this producer slot**. *Input On / Off*
      and *Gated On / Off* fire on input transitions (the gated forms respect
      the veto register, so a panel button can be silenced without unbinding
      it). *Cascade command* and *Output State* options report when a command
      arrives, even before the line moves. *Output On / Off (Function hi/lo)*
      fire when the physical line actually changes state, useful for confirming
      a relay or LED responded.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "Slot is unused — no event is produced."
        category: null
      - value: 5
        label: "Input On"
        description: "Fire the indicator when the input edge becomes **active** (per Input polarity)."
        category: "Input"
      - value: 6
        label: "Input Off"
        description: "Fire the indicator when the input edge becomes **inactive**."
        category: "Input"
      - value: 7
        label: "Gated On (Non Veto Input)"
        description: "Like *Input On*, but only fires while the veto register is **inactive**."
        category: "Input"
      - value: 8
        label: "Gated Off (Non Veto Input)"
        description: "Like *Input Off*, but only fires while the veto register is **inactive**."
        category: "Input"
      - value: 9
        label: "Cascade command"
        description: "Re-emit the consumer command on this line as a producer event, useful to chain logic across nodes."
        category: "Command"
      - value: 1
        label: "Output State On command"
        description: "Fire when an **On** command arrives at the line (even before drive completes)."
        category: "Command"
      - value: 2
        label: "Output State Off command"
        description: "Fire when an **Off** command arrives at the line."
        category: "Command"
      - value: 3
        label: "Output On (Function hi)"
        description: "Fire when the line **physically reaches** its active output state."
        category: "Output"
      - value: 4
        label: "Output Off (Function lo)"
        description: "Fire when the line **physically reaches** its inactive output state."
        category: "Output"
    citation: "Manual Section 6.3.5 Indications, page 24."

  - cdiPath: "Port I/O-1/Line/Actions/Producers/Indicator"
    name: "Indicator"
    elementType: "eventid"
    description: |
      Producer EventID **sent by this Signal-LCC** whenever the configured
      *Upon this action* condition fires. Other nodes (or JMRI sensors)
      consume this event to know the line changed state. Up to 6 producer
      slots per line, so one input can broadcast several events for different
      conditions.
    units: null
    validRange: null
    typicalValues: null
    role: "Producer"
    citation: "Manual Section 6.3.5 Indications, page 24. CDI description: '(P) this event will be sent'."

  # =========================================================================
  # Segment: Conditionals  (Logic group, replication=32)
  # =========================================================================
  - cdiPath: "Conditionals/Logic/Description"
    name: "Description"
    elementType: "string"
    description: |
      Free-form label describing **what this conditional represents** — for
      example *"Mast 101L Approach"* or *"OS section interlock"*. Helps you
      navigate 32 slots that otherwise look identical in the configuration
      tool.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 32
    citation: "Manual Section 7.2 Logic Description, page 26."

  - cdiPath: "Conditionals/Logic/Function"
    name: "Function"
    elementType: "int"
    description: |
      How this conditional **participates in evaluation**. *Blocked* skips it
      entirely (useful for disabling logic without losing its setup). *Group*
      marks it as part of a multi-conditional group that flows top-down using
      *Action when true / false* selectors. *Last (Single)* marks the end of a
      group (or a stand-alone rule) — evaluation never falls past a *Last*
      entry.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Blocked"
        description: "Conditional is **not evaluated**. Use to temporarily disable logic without losing its variables and actions."
        category: null
      - value: 1
        label: "Group"
        description: "Part of a chained group. Evaluation may continue into the next conditional based on the *when true / when false* selectors."
        category: null
      - value: 2
        label: "Last (Single)"
        description: "End of a group or a stand-alone conditional. Evaluation does not fall through past this entry."
        category: null
    citation: "Manual Section 7.3 Group function, page 26."

  # ----- Conditionals/Logic/Variable #1 -----
  - cdiPath: "Conditionals/Logic/Variable #1/Trigger"
    name: "Trigger"
    elementType: "int"
    description: |
      Decides **when this variable causes the conditional to be re-evaluated**.
      *On Variable Change* fires only when the variable's stored true/false
      state actually flips; *On Matching Event* fires on every matching event
      (even if the state is unchanged) — useful when a downstream action
      should re-send on every trigger. *None* disables the variable
      altogether, so it never participates in evaluation.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "On Variable Change"
        description: "Re-evaluate the conditional only when this variable's stored value flips between true and false."
        category: null
      - value: 1
        label: "On Matching Event"
        description: "Re-evaluate the conditional on every matching consumer event, even when the variable's value does not change."
        category: null
      - value: 2
        label: "None"
        description: "Variable is inactive — it neither triggers evaluation nor contributes to the logic operation."
        category: null
    citation: "Manual Section 7.4.1 Variable Trigger, page 27. Relevance rule R012."

  - cdiPath: "Conditionals/Logic/Variable #1/Source"
    name: "Source"
    elementType: "int"
    description: |
      Where the variable gets its **true/false value** from. *Use Variable
      #1's (C) Events* drives it from the pair of consumer eventids below
      (the classical Signal-LCC variable). *Track Circuit 1..8* instead reads
      the variable from the corresponding Track Circuit RX table, comparing
      its current speed indication against the **Track Speed** selector — true
      when the speed permits the chosen state, false otherwise.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Use Variable #1's (C) Events"
        description: "Variable is driven by the *set true* / *set false* consumer events configured below."
        category: "Event-driven"
      - value: 1
        label: "Track Circuit 1"
        description: "Variable mirrors Track Circuit 1's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 2
        label: "Track Circuit 2"
        description: "Variable mirrors Track Circuit 2's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 3
        label: "Track Circuit 3"
        description: "Variable mirrors Track Circuit 3's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 4
        label: "Track Circuit 4"
        description: "Variable mirrors Track Circuit 4's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 5
        label: "Track Circuit 5"
        description: "Variable mirrors Track Circuit 5's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 6
        label: "Track Circuit 6"
        description: "Variable mirrors Track Circuit 6's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 7
        label: "Track Circuit 7"
        description: "Variable mirrors Track Circuit 7's speed indication compared to **Track Speed**."
        category: "Track Circuit"
      - value: 8
        label: "Track Circuit 8"
        description: "Variable mirrors Track Circuit 8's speed indication compared to **Track Speed**."
        category: "Track Circuit"
    citation: "Manual Section 7.4.2 Variable Source, pages 27–29. Relevance rules R014, R016, R017."

  - cdiPath: "Conditionals/Logic/Variable #1/Track Speed"
    name: "Track Speed"
    elementType: "int"
    description: |
      Approach-speed threshold used **only when Source is a Track Circuit**.
      The variable is true while the linked circuit reports this speed (or
      better, per NORAC ordering). Has no effect when Source is *Use Variable
      #1's (C) Events*.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Stop"
        description: "True while the linked circuit reports **Stop**."
        category: null
      - value: 1
        label: "Restricting/Tumble Down"
        description: "True while the linked circuit reports **Restricting** (a.k.a. Tumble Down)."
        category: null
      - value: 2
        label: "Slow"
        description: "True while the linked circuit reports **Slow**."
        category: null
      - value: 3
        label: "Medium"
        description: "True while the linked circuit reports **Medium**."
        category: null
      - value: 4
        label: "Limited"
        description: "True while the linked circuit reports **Limited**."
        category: null
      - value: 5
        label: "Approach"
        description: "True while the linked circuit reports **Approach**."
        category: null
      - value: 6
        label: "Approach-Medium"
        description: "True while the linked circuit reports **Approach-Medium**."
        category: null
      - value: 7
        label: "Clear/Proceed"
        description: "True while the linked circuit reports **Clear / Proceed**."
        category: null
    citation: "Manual Section 7.4.2.2 Track Circuit (RX), pages 28–29."

  - cdiPath: "Conditionals/Logic/Variable #1/set true"
    name: "set true"
    elementType: "eventid"
    description: |
      Consumer event that **sets Variable #1 to true** when Source is *Use
      Variable #1's (C) Events*. Bind to an occupancy detector's *clear*
      indicator, a panel button, or any other producer that signals the
      condition is met.
    units: null
    validRange: null
    typicalValues: null
    role: "Consumer"
    citation: "CDI: '(C) Event to set variable #1 true.' Manual Section 7.4.2.1 Events, page 27. Relevance rule R016."

  - cdiPath: "Conditionals/Logic/Variable #1/set false"
    name: "set false"
    elementType: "eventid"
    description: |
      Consumer event that **sets Variable #1 to false** when Source is *Use
      Variable #1's (C) Events*. Typically the matching *occupied* / *button
      released* counterpart to the *set true* event.
    units: null
    validRange: null
    typicalValues: null
    role: "Consumer"
    citation: "CDI: '(C) Event to set variable #1 false.' Manual Section 7.4.2.1 Events, page 27. Relevance rule R017."

  # Logic Operation
  - cdiPath: "Conditionals/Logic/Logic Operation"
    name: "Logic Operation"
    elementType: "int"
    description: |
      How **Variable #1 and Variable #2 combine** to decide whether the
      conditional is true or false. The *=> change* variants fire only on a
      transition (not steady-state). Use *V1 Only* / *V2 Only* when one
      variable is unused. *null => true* unconditionally evaluates true,
      handy for conditionals whose job is purely to send action events on a
      timer.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "V1 AND V2"
        description: "True when both variables are true."
        category: "Combine"
      - value: 1
        label: "V1 OR V2"
        description: "True when either variable is true."
        category: "Combine"
      - value: 2
        label: "V1 XOR V2"
        description: "True when exactly one variable is true."
        category: "Combine"
      - value: 3
        label: "V1 AND V2 => change"
        description: "Like *V1 AND V2*, but fires only on the transition into the true state."
        category: "Edge"
      - value: 4
        label: "V1 OR V2 => change"
        description: "Like *V1 OR V2*, but fires only on the transition into the true state."
        category: "Edge"
      - value: 5
        label: "V1 AND Then V2 => true"
        description: "True only when V1 becomes true **before** V2 (a temporal AND)."
        category: "Sequence"
      - value: 7
        label: "V1 Only"
        description: "Use Variable #1 alone; ignore Variable #2."
        category: "Single"
      - value: 8
        label: "V2 Only"
