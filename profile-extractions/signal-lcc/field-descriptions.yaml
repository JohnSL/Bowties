  - cdiPath: "Rule to Aspect/Mast/Rule/Appearance/Lamp Phase (A-B) - Flash Rate"
    name: "Lamp Phase (A-B) - Flash Rate"
    elementType: "int"
    description: |
      Whether the chosen lamp **stays steady or flashes**, and on which phase.
      Phase A and B share frequency but flash in opposite halves of the
      cycle, so a yellow on phase A and a red on phase B alternate cleanly
      for prototypical *Approach-flashing* / *Restricting* effects. Three
      rates (Slow / Medium / Fast) cover most rule books.

      *None (not used)* is a hold-over from older rev firmware — prefer
      *Unused* on Lamp Selection to disable a slot.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Steady"
        description: "Lamp stays on continuously while the rule is active."
        category: "Steady"
      - value: 1
        label: "A-Slow"
        description: "Flashes on phase **A** at the slow rate."
        category: "A-phase"
      - value: 2
        label: "A-Medium"
        description: "Flashes on phase **A** at the medium rate."
        category: "A-phase"
      - value: 3
        label: "A-Fast"
        description: "Flashes on phase **A** at the fast rate."
        category: "A-phase"
      - value: 4
        label: "None (not used)"
        description: "Lamp slot is inert. Prefer setting **Lamp Selection** to *Unused* to disable the slot."
        category: null
      - value: 5
        label: "B-Slow"
        description: "Flashes on phase **B** (opposite of A) at the slow rate."
        category: "B-phase"
      - value: 6
        label: "B-Medium"
        description: "Flashes on phase **B** at the medium rate."
        category: "B-phase"
      - value: 7
        label: "B-Fast"
        description: "Flashes on phase **B** at the fast rate."
        category: "B-phase"
    citation: "Manual Section 8.6.3 Lamp Phase (A-B) Flash Rate, page 35. Relevance rule R022."

  - cdiPath: "Rule to Aspect/Mast/Rule/Appearance Effects"
    name: "Appearance Effects"
    elementType: "int"
    description: |
      Optional **special effect** applied to one lamp of the aspect. Use
      *Transition down* to smoothly dim the previous aspect's lamp during a
      change (most common for incandescent simulations), *H2 Red Flash* for
      the prototype's red-flashing-on-Head-2 detail, and *Strobe* for high-
      intensity warning lamps.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "No special effect."
        category: null
      - value: 1
        label: "Transition down"
        description: "Smoothly dim the **Effects Lamp** down during an aspect change (incandescent transition)."
        category: null
      - value: 2
        label: "H2 Red Flash"
        description: "Flash the **Effects Lamp** to mimic the prototype's Head-2 red flash on certain rules."
        category: null
      - value: 3
        label: "Strobe"
        description: "Strobe the **Effects Lamp** for a high-intensity warning."
        category: null
    citation: "Manual Section 8.6.4 Appearance Effects, page 35. Relevance rule R023."

