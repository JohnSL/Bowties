  # ----- Conditionals/Logic/Action[0] (singleton) -----
  - cdiPath: "Conditionals/Logic/Action[0]/when true"
    name: "when true"
    elementType: "int"
    description: |
      Choose **how evaluation continues when this conditional is true**. *Send
      then Exit Group* fires the action events (subject to their per-slot
      Condition) and stops evaluating further conditionals in the group.
      *Evaluate Next* and *AND / OR with Next* chain into the following
      conditional, building larger Boolean expressions across multiple
      Logic slots.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Send then Exit Group"
        description: "Fire the action events for this conditional, then stop evaluating the group."
        category: "Send + flow"
      - value: 2
        label: "Send then Evaluate Next"
        description: "Fire the action events, then continue with the next conditional."
        category: "Send + flow"
      - value: 3
        label: "Exit Group"
        description: "Do not fire action events; stop evaluating the group."
        category: "Flow only"
      - value: 4
        label: "Evaluate Next"
        description: "Do not fire action events; continue with the next conditional."
        category: "Flow only"
      - value: 5
        label: "AND with Next"
        description: "Carry a logical AND of this result into the next conditional's evaluation."
        category: "Chain"
      - value: 6
        label: "OR  with Next"
        description: "Carry a logical OR of this result into the next conditional's evaluation."
        category: "Chain"
    citation: "Manual Section 7.7 Action when Conditional = True, page 29."

  - cdiPath: "Conditionals/Logic/Action[0]/when false"
    name: "when false"
    elementType: "int"
    description: |
      Choose **how evaluation continues when this conditional is false**. Same
      options as *when true*, so a single Logic slot can branch differently
      on its two outcomes (for example *Send then Exit Group* on true,
      *Evaluate Next* on false, to retry with another conditional only when
      the first fails).
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Send then Exit Group"
        description: "Fire the action events, then stop evaluating the group."
        category: "Send + flow"
      - value: 2
        label: "Send then Evaluate Next"
        description: "Fire the action events, then continue with the next conditional."
        category: "Send + flow"
      - value: 3
        label: "Exit Group"
        description: "Do not fire action events; stop evaluating the group."
        category: "Flow only"
      - value: 4
        label: "Evaluate Next"
        description: "Do not fire action events; continue with the next conditional."
        category: "Flow only"
      - value: 5
        label: "AND with Next"
        description: "Carry a logical AND of this (false) result into the next conditional."
        category: "Chain"
      - value: 6
        label: "OR  with Next"
        description: "Carry a logical OR of this (false) result into the next conditional."
        category: "Chain"
    citation: "Manual Section 7.8 Action when Conditional = False, page 30."

  # ----- Conditionals/Logic/Time Delay before action -----
  - cdiPath: "Conditionals/Logic/Time Delay before action/Delay Time (1-60000)"
    name: "Delay Time (1-60000)"
    elementType: "int"
    description: |
      How long to wait before this conditional's **delayed action events** are
      sent. Used by per-slot Condition values *After delay*, *Delayed if
      True*, and *Delayed if False*.
    units: "selected by Units field"
    validRange:
      min: 1
      max: 60000
    typicalValues: null
    citation: "Manual Section 7.9 Delay, page 31."

  - cdiPath: "Conditionals/Logic/Time Delay before action/Units"
    name: "Units"
    elementType: "int"
    description: |
      Time unit applied to **Delay Time** for this conditional.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Milliseconds"
        description: "Delay Time is interpreted as milliseconds."
        category: null
      - value: 1
        label: "Seconds"
        description: "Delay Time is interpreted as seconds."
        category: null
      - value: 2
        label: "Minutes"
        description: "Delay Time is interpreted as minutes."
        category: null
    citation: "Manual Section 7.9 Delay, page 31."

  - cdiPath: "Conditionals/Logic/Time Delay before action/Retriggerable"
    name: "Retriggerable"
    elementType: "int"
    description: |
      Whether **new triggers restart the delay** while it is already running.
      *Yes* resets the timer (useful for approach-light extension); *No* lets
      the original delay complete and ignores intermediate triggers.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "No"
        description: "Once the delay starts, additional triggers are ignored until it expires."
        category: null
      - value: 1
        label: "Yes"
        description: "Every new trigger restarts the delay from zero."
        category: null
    citation: "Manual Section 7.9 Delay, page 31."

  # ----- Conditionals/Logic/Action[1-4] (replication=4) -----
  - cdiPath: "Conditionals/Logic/Action[1-4]/Condition"
    name: "Condition"
    elementType: "int"
    description: |
      When this action slot fires its **Action Event**. *Immediately* sends at
      evaluation time; *After delay* waits for the conditional's delay timer.
      The *if True / if False* variants gate the send on the conditional's
      result, letting one slot emit only on success and another only on
      failure.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "none"
        description: "Slot is unused — no event is ever sent for this action position."
        category: null
      - value: 1
        label: "Immediately"
        description: "Send the Action Event as soon as the conditional fires."
        category: "Immediate"
      - value: 2
        label: "After delay"
        description: "Send the Action Event after the conditional's **Time Delay before action**."
        category: "Delayed"
      - value: 3
        label: "Immediate if True"
        description: "Send the Action Event immediately, but only when the conditional evaluates true."
        category: "Immediate (gated)"
      - value: 4
        label: "Immediate if False"
        description: "Send the Action Event immediately, but only when the conditional evaluates false."
        category: "Immediate (gated)"
      - value: 5
        label: "Delayed if True"
        description: "Send the Action Event after the delay, but only when the conditional evaluates true."
        category: "Delayed (gated)"
      - value: 6
        label: "Delayed if False"
        description: "Send the Action Event after the delay, but only when the conditional evaluates false."
        category: "Delayed (gated)"
    citation: "Manual Section 7.10 Actions (Producers), page 31. Relevance rule R020."

  - cdiPath: "Conditionals/Logic/Action[1-4]/Action Event"
    name: "Action Event"
    elementType: "eventid"
    description: |
      Producer EventID **sent by this Signal-LCC** when this action slot's
      *Condition* fires. Four slots per conditional let one Logic entry drive
      a multi-lamp aspect or distribute several follow-up events.
    units: null
    validRange: null
    typicalValues: null
    role: "Producer"
    citation: "CDI: '(P) this event will be sent'. Manual Section 7.10 Actions (Producers), page 31."

  # =========================================================================
  # Segment: Rule to Aspect  (Mast group, replication=8)
  # =========================================================================
  - cdiPath: "Rule to Aspect/Mast/Mast Processing"
    name: "Mast Processing"
    elementType: "int"
    description: |
      Activates or extends this mast slot. *Unused* leaves it inert (saves
      configuration noise for nodes that drive fewer than 8 masts). *Normal*
      treats it as a stand-alone mast with its own 8 rules. *Linked to
      Previous* chains it to the prior mast so the two share a single mast
      identity with a combined 16 rules, useful for unusual aspect counts.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "Unused"
        description: "Mast slot is inactive. **Mast Description**, **Link Address**, **Lamp Fade**, and all Rules / Appearances have no effect."
        category: null
      - value: 1
        label: "Normal"
        description: "Stand-alone mast with up to 8 rules. Publishes its own **Link Address**."
        category: null
      - value: 2
        label: "Linked to Previous"
        description: "Extension of the previous mast — shares its identity and adds another 8 rule slots, giving 16 total."
        category: null
    citation: "Manual Section 8.1 Mast Processing, page 31. Relevance rule R021 (everything below is inert when Unused)."

  - cdiPath: "Rule to Aspect/Mast/Mast Description"
    name: "Mast Description"
    elementType: "string"
    description: |
      Free-form label for **this mast** — for example *"Eastbound 101L"*. Shown
      in configuration-tool tabs to identify the mast at a glance.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 32
    citation: "Manual Section 8.2 Mast ID, page 32."

  - cdiPath: "Rule to Aspect/Mast/Link Address"
    name: "Link Address"
    elementType: "eventid"
    description: |
      Producer EventID this mast **publishes its current speed indication on**
      (one of the eight NORAC speeds, derived from the active rule's **Track
      Speed**). It is read-only / limited-write — generated by the node when
      the mast is configured. To make the next signal in the route follow
      this one, **copy this EventID** and paste it into the **Track Circuits
      / Circuit / Link Address** field on the upstream node.
    units: null
    validRange: null
    typicalValues: null
    role: "Producer"
    citation: "Manual Section 8.3 (P) Track Circuit Link Address, page 32. CDI: '(P) Track Circuit Link Address. Copy and Paste into linked Track Circuit (Limited Write)'."

  - cdiPath: "Rule to Aspect/Mast/Lamp Fade"
    name: "Lamp Fade"
    elementType: "int"
    description: |
      Whether this mast's lamps **snap or fade** between aspects. *None* gives
      crisp instant changes (typical for color-light heads). *Incandescent*
      cross-fades using the warm-up / cool-down curve of an incandescent bulb,
      so semaphore or older head models look prototypical.
    units: null
    validRange: null
    typicalValues: null
    options:
      - value: 0
        label: "None"
        description: "Lamps switch instantly between aspects."
        category: null
      - value: 1
        label: "Incandescent"
        description: "Lamps cross-fade with a prototypical incandescent warm-up / cool-down curve."
        category: null
    citation: "Manual Section 8.4 Lamp Fade, page 33."

