  - cdiPath: "Track Circuits/Circuit/Remote Mast Description"
    name: "Remote Mast Description"
    elementType: "string"
    description: |
      Free-form label for the **upstream mast** whose Link Address is pasted
      below — for example *"Mast 103L (on Signal-LCC at Whitehead West)"*.
      Helps you recognise the RX side of a virtual code line without
      decoding the EventID.
    units: null
    validRange: null
    typicalValues: null
    maxLength: 32
    citation: "Manual Section 9.2 Linking Virtual Code Lines, pages 36–37."

  - cdiPath: "Track Circuits/Circuit/Link Address"
    name: "Link Address"
    elementType: "eventid"
    description: |
      Consumer EventID copied from the **next** mast's *(P) Track Circuit Link
      Address*. Once pasted, this Signal-LCC subscribes to that mast's speed
      indications and any Logic variable that picks this circuit as its
      Source will react to the upstream speed.
    units: null
    validRange: null
    typicalValues: null
    role: "Consumer"
    citation: "Manual Section 9.2 Linking Virtual Code Lines, pages 36–37. CDI: '(C) Remote Mast Link Address. Copy from \"Next\" Mast and Paste here.'"

