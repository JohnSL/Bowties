name: Frontend Regression Gate

on:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/frontend-regression-gate.yml'
      - '.github/pull_request_template.md'
      - 'docs/project/development.md'
      - 'docs/technical/architecture.md'
      - 'specs/010-offline-layout-editing/**'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/frontend-regression-gate.yml'
      - '.github/pull_request_template.md'
      - 'docs/project/development.md'
      - 'docs/technical/architecture.md'
      - 'specs/010-offline-layout-editing/**'

jobs:
  refactor-gate:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Run lifecycle regression gate
        working-directory: app
        run: npm run test:refactor-gate