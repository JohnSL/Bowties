name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --bundles nsis
          - os: ubuntu-latest
            args: --bundles deb,appimage
          - os: ubuntu-22.04
            args: --bundles deb --target aarch64-unknown-linux-gnu
            cross_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target for cross-compilation
        if: matrix.cross_target != ''
        run: rustup target add ${{ matrix.cross_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
          prefix-key: ${{ matrix.cross_target || 'native' }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev

      - name: Install ARM64 cross-compilation dependencies
        if: matrix.cross_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          . /etc/os-release

          # Rewrite sources.list with explicit amd64-only entries (traditional format)
          printf "deb [arch=amd64] http://archive.ubuntu.com/ubuntu %s main restricted universe multiverse\n" \
            "$VERSION_CODENAME" "$VERSION_CODENAME-updates" "$VERSION_CODENAME-backports" \
            | sudo tee /etc/apt/sources.list
          echo "deb [arch=amd64] http://security.ubuntu.com/ubuntu $VERSION_CODENAME-security main restricted universe multiverse" \
            | sudo tee -a /etc/apt/sources.list

          # Remove deb822-format sources (ubuntu.sources) — these have no per-arch filtering
          # and cause apt to request arm64 packages from mirrors that don't carry them.
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources

          # Restrict any remaining .list files to amd64
          sudo find /etc/apt/sources.list.d/ -name "*.list" \
            -exec sudo sed -i \
              's/^deb \[arch=\([^]]*\)\]/deb [arch=amd64]/; t; s/^deb http/deb [arch=amd64] http/' \
            {} \;

          # Add arm64 package sources from ports.ubuntu.com
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $VERSION_CODENAME main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $VERSION_CODENAME-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $VERSION_CODENAME-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $VERSION_CODENAME-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports-arm64.list

          sudo apt-get update
          sudo apt-get install -y \
            -o Dpkg::Options::="--force-overwrite" \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            patchelf \
            libudev-dev:arm64

      - name: Set cross-compilation environment
        if: matrix.cross_target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: Bowties ${{ github.ref_name }}
          releaseBody: See the assets below to download and install this release of Bowties.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
