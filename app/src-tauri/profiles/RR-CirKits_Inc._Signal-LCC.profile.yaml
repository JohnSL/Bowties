# Structure profile for RR-CirKits, Inc. / Signal-LCC
#
# Generated by .github/skills/_lib/profile_tools.py assemble from
# the extraction outputs in this directory. Re-running assemble will
# overwrite this file; hand edits should be re-applied or migrated
# back into the extraction sources (event-roles.json,
# relevance-rules.json) so they survive re-assembly.
#
# Schema: https://bowties.app/schemas/structure-profile-v2.schema.json
# (see specs/014-config-modes-placeholders for the v1→v2 changes).
# The Bowties profile loader rejects schemaVersion "1.0".

schemaVersion: "2.0"

# Node type — matched against the SNIP manufacturer/model fields
# reported by the node when Bowties connects.
nodeType:
  manufacturer: "RR-CirKits, Inc."
  model: "Signal-LCC"

# Event role declarations
#
# Each entry maps a name-based CDI group path to a declared role. All
# eventid leaves inside the matching group — across every replicated
# instance — receive this role, overriding any heuristic assignment.
#
# Path notation: '/'-separated CDI element names. Use '#N' (1-based)
# to disambiguate same-named sibling groups (e.g. Conditionals/Logic/Action#2).
# Paths that cannot be resolved in the connected node's CDI are
# silently skipped with a log warning.

eventRoles:
  # ── Node Power Monitor ──
  - groupPath: "Node Power Monitor"
    role: Producer

  # ── Port I/O-1 ──
  - groupPath: "Port I/O-1/Line/Commands/Consumers"
    role: Consumer
  - groupPath: "Port I/O-1/Line/Actions/Producers"
    role: Producer

  # ── Conditionals ──
  - groupPath: "Conditionals/Logic/Variable #1"
    role: Consumer
  - groupPath: "Conditionals/Logic/Variable #2"
    role: Consumer
  - groupPath: "Conditionals/Logic/Action#2"
    role: Producer

  # ── Rule to Aspect ──
  - groupPath: "Rule to Aspect/Mast"
    role: Producer
  - groupPath: "Rule to Aspect/Mast/Rule"
    role: Consumer
  - groupPath: "Rule to Aspect/Mast/Rule"
    role: Producer

  # ── Direct Lamp Control ──
  - groupPath: "Direct Lamp Control/Lamp"
    role: Consumer

  # ── Track Circuits ──
  - groupPath: "Track Circuits/Circuit"
    role: Consumer

# Channel styles
#
# Per Spec 018 / ADR-0013, a style is the hardware-shape realisation that
# pairs with a role. `single-led-direct-lamp` realises the `lamp-indicator`
# role over a single Direct Lamp Control row; lit/unlit live state is
# derived from observed Lamp On / Lamp Off PCERs on the bus.
#
# `constraints` is intentionally empty in this release: Bowties does NOT
# auto-lock the claimed row's `Lamp Selection` field. The user must set
# Lamp Selection manually in the Config tab. The future automatic lock is
# tracked in specs/backlog.md (style-driven Lamp Selection auto-lock).
#
# `eventMapping` is informational — the authoritative source for state →
# leaf-index resolution is `app/src/lib/utils/channelStyles.ts`
# (`STYLE_EVENT_MAPPINGS`). When the catalog moves into YAML the backend
# will start reading this field.
styles:
  - styleId: "single-led-direct-lamp"
    bindingKind: "lampRow"
    eventMapping:
      lit:
        consumerLeafIndex: 0
      unlit:
        consumerLeafIndex: 1
    constraints: []

# Relevance rules
#
# Each rule declares that a CDI section becomes irrelevant when the
# listed controlling field has one of the given values. The
# 'explanation' is shown VERBATIM in the UI banner — do not paraphrase
# or substitute when editing.

relevanceRules:
  # ── Port I/O-1 ──
  - id: "R001"
    affectedTarget: "Port I/O-1/Line/Commands/Consumers"
    allOf:
      - field: "Output Function"
        irrelevantWhen: [0]
    explanation: "Commands (consumer events) control the line's output state, so they have no useful effect when Output Function is 'None' and the line is not configured as an output. To use Commands, set Output Function to Steady, Pulse, Blink A, or Blink B."
  - id: "R002"
    affectedTarget: "Port I/O-1/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
    allOf:
      - field: "Output Function"
        irrelevantWhen: [0]
    explanation: "The output drive polarity (Low/High) only matters when the line is configured as an output. With Output Function set to 'None', the line is not driven and the polarity setting has no effect."
  - id: "R003"
    affectedTarget: "Port I/O-1/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
    allOf:
      - field: "Input Function"
        irrelevantWhen: [0]
    explanation: "The indication polarity (Low/High) determines at which line voltage input-driven indication events are sent. With Input Function set to 'None', no input-driven indications are produced and the polarity setting has no effect."
  - id: "R004"
    affectedTarget: "Port I/O-1/Line/Output Function"
    allOf:
      - field: "Input Function"
        irrelevantWhen: [1, 2]
    explanation: "When Input Function is enabled, the Signal LCC hardware uses the line as an input and any Output Function setting is overridden. To use this line as an output, first set Input Function to 'None'."
  - id: "R005"
    affectedTarget: "Port I/O-1/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
    allOf:
      - field: "Input Function"
        irrelevantWhen: [1, 2]
    explanation: "When Input Function is enabled, the line is used as an input and the output drive polarity has no effect because the hardware overrides the output. To use the output polarity, set Input Function to 'None'."

  # ── Conditionals ──
  - id: "R006"
    affectedTarget: "Conditionals/Logic/Variable #1"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "When a logic conditional is set to 'Blocked', the entire conditional is skipped during evaluation, so Variable #1's trigger, source, track speed, and events have no effect. To activate this variable, set Function to 'Group' or 'Last (Single)'."
  - id: "R007"
    affectedTarget: "Conditionals/Logic/Variable #2"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "When a logic conditional is set to 'Blocked', the entire conditional is skipped during evaluation, so Variable #2's trigger, source, track speed, and events have no effect. To activate this variable, set Function to 'Group' or 'Last (Single)'."
  - id: "R008"
    affectedTarget: "Conditionals/Logic/Logic Operation"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "The logic operator (V1 AND V2, V1 OR V2, etc.) is only evaluated when the conditional is active. A 'Blocked' conditional is never evaluated, so the operator has no effect."
  - id: "R009"
    affectedTarget: "Conditionals/Logic/Action#1"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "The 'when true' and 'when false' exit/send actions are only used when the conditional evaluates. A 'Blocked' conditional is never evaluated, so these settings have no effect."
  - id: "R010"
    affectedTarget: "Conditionals/Logic/Time Delay before action"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "The delay timer applied before action events is only used when the conditional fires. A 'Blocked' conditional is never evaluated, so the delay has no effect."
  - id: "R011"
    affectedTarget: "Conditionals/Logic/Action#2"
    allOf:
      - field: "Function"
        irrelevantWhen: [0]
    explanation: "The up-to-four action (producer) events fired by this conditional only matter when the conditional is evaluated. A 'Blocked' conditional is never evaluated, so its action events are never sent."
  - id: "R012"
    affectedTarget: "Conditionals/Logic/Variable #1"
    allOf:
      - field: "Trigger"
        irrelevantWhen: [2]
    explanation: "When Variable #1's Trigger is 'None', the variable does not trigger any conditional evaluation, so its source, track speed, and set true/false events have no effect. To use this variable, set Trigger to 'On Variable Change' or 'On Matching Event'."
  - id: "R013"
    affectedTarget: "Conditionals/Logic/Variable #2"
    allOf:
      - field: "Trigger"
        irrelevantWhen: [2]
    explanation: "When Variable #2's Trigger is 'None', the variable does not trigger any conditional evaluation, so its source, track speed, and set true/false events have no effect. To use this variable, set Trigger to 'On Variable Change' or 'On Matching Event'."
  - id: "R014"
    affectedTarget: "Conditionals/Logic/Variable #1/Track Speed"
    allOf:
      - field: "Source"
        irrelevantWhen: [0]
    explanation: "Track Speed selects which approach speed indication this variable monitors on a Track Circuit (RX) table. When the variable's Source is 'Use Variable #1's (C) Events', the variable is driven by its own consumer events instead, and Track Speed has no effect."
  - id: "R015"
    affectedTarget: "Conditionals/Logic/Variable #2/Track Speed"
    allOf:
      - field: "Source"
        irrelevantWhen: [0]
    explanation: "Track Speed selects which approach speed indication this variable monitors on a Track Circuit (RX) table. When the variable's Source is 'Use Variable #2's (C) Events', the variable is driven by its own consumer events instead, and Track Speed has no effect."
  - id: "R016"
    affectedTarget: "Conditionals/Logic/Variable #1/set true"
    allOf:
      - field: "Source"
        irrelevantWhen: [1, 2, 3, 4, 5, 6, 7, 8]
    explanation: "The 'set true' consumer event is only used when the variable is driven by events. When Source points to a Track Circuit (RX) table, the variable follows the speed indication received from that circuit and this event has no effect. To use this event, set Source to 'Use Variable #1's (C) Events'."
  - id: "R017"
    affectedTarget: "Conditionals/Logic/Variable #1/set false"
    allOf:
      - field: "Source"
        irrelevantWhen: [1, 2, 3, 4, 5, 6, 7, 8]
    explanation: "The 'set false' consumer event is only used when the variable is driven by events. When Source points to a Track Circuit (RX) table, the variable follows the speed indication received from that circuit and this event has no effect. To use this event, set Source to 'Use Variable #1's (C) Events'."
  - id: "R018"
    affectedTarget: "Conditionals/Logic/Variable #2/set true"
    allOf:
      - field: "Source"
        irrelevantWhen: [1, 2, 3, 4, 5, 6, 7, 8]
    explanation: "The 'set true' consumer event is only used when the variable is driven by events. When Source points to a Track Circuit (RX) table, the variable follows the speed indication received from that circuit and this event has no effect. To use this event, set Source to 'Use Variable #2's (C) Events'."
  - id: "R019"
    affectedTarget: "Conditionals/Logic/Variable #2/set false"
    allOf:
      - field: "Source"
        irrelevantWhen: [1, 2, 3, 4, 5, 6, 7, 8]
    explanation: "The 'set false' consumer event is only used when the variable is driven by events. When Source points to a Track Circuit (RX) table, the variable follows the speed indication received from that circuit and this event has no effect. To use this event, set Source to 'Use Variable #2's (C) Events'."
  - id: "R020"
    affectedTarget: "Conditionals/Logic/Action#2/Action Event"
    allOf:
      - field: "Condition"
        irrelevantWhen: [0]
    explanation: "When an action's Condition is set to 'none', no event is ever sent for this action slot, so the Action Event EventID has no effect. To send an event, choose a Condition such as 'Immediately', 'After delay', or one of the Immediate/Delayed if True/False options."

  # ── Rule to Aspect ──
  - id: "R021"
    affectedTarget: "Rule to Aspect/Mast"
    allOf:
      - field: "Mast Processing"
        irrelevantWhen: [0]
    explanation: "When a mast's Mast Processing is set to 'Unused', the entire mast entry is disabled. Mast Description, Link Address, Lamp Fade, and all Rule/Appearance settings have no effect. To configure this mast, set Mast Processing to 'Normal' or 'Linked to Previous'."
  - id: "R022"
    affectedTarget: "Rule to Aspect/Mast/Rule/Appearance/Lamp Phase (A-B) - Flash Rate"
    allOf:
      - field: "Lamp Selection"
        irrelevantWhen: [0]
    explanation: "Lamp Phase / Flash Rate controls how the selected lamp flashes or stays steady for this aspect appearance slot. When Lamp Selection is 'Unused', no lamp is driven by this slot and the phase setting has no effect."
  - id: "R023"
    affectedTarget: "Rule to Aspect/Mast/Rule/Effects Lamp"
    allOf:
      - field: "Appearance Effects"
        irrelevantWhen: [0]
    explanation: "Effects Lamp selects which lamp the special effect (Transition down, H2 Red Flash, Strobe) applies to. When Appearance Effects is 'None', no special effect is active and the Effects Lamp selection has no effect."

  # ── Direct Lamp Control ──
  - id: "R024"
    affectedTarget: "Direct Lamp Control/Lamp"
    allOf:
      - field: "Lamp Selection"
        irrelevantWhen: [0]
    explanation: "Direct Lamp Control entries drive lamps not used by any mast. When Lamp Selection is 'Used by Mast', this slot is unused for direct control because the lamp is already controlled by a mast aspect, so Lamp Description, Lamp On / Lamp Off events, Lamp Fade, and Lamp Phase have no effect."

# Configuration Modes (v2)
#
# Two modes are declared:
#   1. `firmware-revision` — CDI-signature auto-detect. Signal-LCC currently
#      ships with the rev-C7c CDI; when a future revision changes paths or
#      enum maps, extend `variantsSignature` with an additional entry and
#      add a matching variant below. The variant id is the key the shared
#      daughterboard catalog uses to look up per-firmware constraint rules.
#   2. `io-1` — structural slot for the single 10-pin I/O connector. The
#      `affectedPaths` cover all 8 line instances; `allowNoneInstalled` lets
#      the user leave the connector empty when wiring lines individually.
#
# IMPORTANT — shared catalog extension required:
# Daughterboard validity rules live in `RR-CirKits.shared-daughterboards.yaml`
# and are currently keyed only to `tower-lcc-c7` (plus legacy base rules
# that target the original Tower-LCC CDI). Those rules reference Tower-LCC
# paths and will NOT resolve against Signal-LCC's CDI:
#   - segment       `Port I/O`             → in Signal-LCC: `Port I/O-1`
#   - event groups  `Event#1` / `Event#2`  → in Signal-LCC:
#                                            `Commands/Consumers` and
#                                            `Actions/Producers`
# Until each daughterboard entry in the shared catalog gains a matching
# `constraintVariants` block with `variantId: "signal-lcc-c7c"` and paths
# rewritten for the Signal-LCC CDI, the variants below will load and the
# slot picker will work, but no daughterboard constraints will be applied.

configurationModes:
  - id: "firmware-revision"
    label: "Firmware revision"
    selector:
      kind: "cdiSignature"
      variantsSignature:
        - variantId: "signal-lcc-c7c"
          signature:
            requiredPaths:
              - "Port I/O-1/Line/Output Function"
              - "Port I/O-1/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
              - "Port I/O-1/Line/Input Function"
              - "Port I/O-1/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
            enumEntryCounts:
              - path: "Port I/O-1/Line/Output Function"
                count: 5
              - path: "Port I/O-1/Line/Input Function"
                count: 3
    variants:
      - id: "signal-lcc-c7c"
        label: "Rev-C7c firmware"
        overlay: {}

  - id: "io-1"
    label: "I/O-1"
    selector:
      kind: "structuralSlot"
      slotId: "io-1"
      slotLabel: "I/O-1"
      slotOrder: 0
      affectedPaths:
        - "Port I/O-1/Line#1"
        - "Port I/O-1/Line#2"
        - "Port I/O-1/Line#3"
        - "Port I/O-1/Line#4"
        - "Port I/O-1/Line#5"
        - "Port I/O-1/Line#6"
        - "Port I/O-1/Line#7"
        - "Port I/O-1/Line#8"
      allowNoneInstalled: true
    variants:
      - id: "BOD4"
        label: "BOD4"
        overlay: {}
      - id: "BOD4-CP"
        label: "BOD4-CP"
        overlay: {}
      - id: "BOD-8-SM"
        label: "BOD-8-SM"
        overlay: {}
      - id: "FOB-A"
        label: "FOB-A"
        overlay: {}
      - id: "FOB-C"
        label: "FOB-C"
        overlay: {}
      - id: "BOB-S"
        label: "BOB-S"
        overlay: {}
      - id: "OI-IB-8"
        label: "OI-IB-8"
        overlay: {}
      - id: "OI-OB-8"
        label: "OI-OB-8"
        overlay: {}
      - id: "RB-2"
        label: "RB-2"
        overlay: {}
      - id: "RB-4"
        label: "RB-4"
        overlay: {}
      - id: "SMD-8"
        label: "SMD-8"
        overlay: {}
      - id: "SCSD-8"
        label: "SCSD-8"
        overlay: {}
      - id: "Isolator-8"
        label: "Isolator-8"
        overlay: {}
      - id: "MSS I/OAdapter"
        label: "MSS I/OAdapter"
        overlay: {}
      - id: "Sampled I/O Splitter Pair"
        label: "Sampled I/O Splitter Pair"
        overlay: {}
      - id: "I/O Test-SM"
        label: "I/O Test-SM"
        overlay: {}
