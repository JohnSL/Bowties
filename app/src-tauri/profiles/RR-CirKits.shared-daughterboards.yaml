  - daughterboardId: "Isolator-8"
    displayName: "Isolator-8"
    kind: "isolation"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Isolation daughterboards do not use Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        explanation: "Isolation daughterboards are limited to Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
