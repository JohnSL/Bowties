        constraintType: allowValues
        allowedValues: [2]
        allowedValueLabels: ["Active Lo"]
        explanation: "The BOD4-CP detector half uses active-low occupancy outputs on local lines 1-4."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
        explanation: "BOD4-CP detector lines can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: hideSection
        explanation: "Consumer output events do not apply to the BOD4-CP detector lines."
    constraintVariants:
      - variantId: "tower-lcc-c7"
        replaceBaseValidityRules: true
        validityRules:
          - targetPath: "Port I/O/Line/Output Function"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["None"]
            explanation: "BOD4-CP local lines 1-4 are occupancy detector outputs, so those lines do not drive output functions."
          - targetPath: "Port I/O/Line/Input Function"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [1]
            allowedValueLabels: ["Normal"]
            explanation: "The rev-C7 Tower-LCC CDI splits detector polarity from input mode, so BOD4-CP local lines 1-4 must use Normal input mode."
          - targetPath: "Port I/O/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: hideSection
            explanation: "BOD4-CP detector lines do not drive commanded outputs, so the command-drive polarity setting is irrelevant."
          - targetPath: "Port I/O/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["Low (0V)"]
            explanation: "BOD4-CP detector outputs are active low, so the producer indication polarity for local lines 1-4 must stay Low (0V)."
          - targetPath: "Port I/O/Line/Event#2/Upon this action"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0, 5, 6, 7, 8]
            allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
            explanation: "BOD4-CP detector lines can only send producer indications from input transitions or gated input transitions."
          - targetPath: "Port I/O/Line/Event#1"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: hideSection
            explanation: "Consumer output events do not apply to the BOD4-CP detector lines."
    metadata:
      notes: "4-block control-point board with 4 detection blocks plus a separate mixed sample/output half. Shared rules constrain the detector half (local lines 1-4) and leave local lines 5-8 available for the board's sampled/output use cases."
      channelInputs:
        - channelType: "block-occupancy"
          inputs: [1, 2, 3, 4]
  - daughterboardId: "BOD-8-SM"
    displayName: "BOD-8-SM"
    kind: "detection"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        allowedValueLabels: ["No Function"]
        explanation: "Occupancy detector boards do not drive Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [2]
        allowedValueLabels: ["Active Lo"]
        explanation: "BOD-8 outputs are low during detection, so governed Tower-LCC lines must use Active Lo input mode."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
        explanation: "Detector daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to detector daughterboards."
    constraintVariants:
      - variantId: "tower-lcc-c7"
        replaceBaseValidityRules: true
        validityRules:
          - targetPath: "Port I/O/Line/Output Function"
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["None"]
            explanation: "Occupancy detector boards do not drive Tower-LCC output functions."
          - targetPath: "Port I/O/Line/Input Function"
            constraintType: allowValues
            allowedValues: [1]
            allowedValueLabels: ["Normal"]
            explanation: "The rev-C7 Tower-LCC CDI splits detector polarity from input mode, so BOD-8-SM lines must use Normal input mode."
          - targetPath: "Port I/O/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
            constraintType: hideSection
            explanation: "BOD-8-SM detector lines do not drive commanded outputs, so the command-drive polarity setting is irrelevant."
          - targetPath: "Port I/O/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["Low (0V)"]
            explanation: "BOD-8-SM detector outputs are active low, so the producer indication polarity must stay Low (0V)."
          - targetPath: "Port I/O/Line/Event#2/Upon this action"
            constraintType: allowValues
            allowedValues: [0, 5, 6, 7, 8]
            allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
            explanation: "Detector daughterboards can only send producer indications from input transitions or gated input transitions."
          - targetPath: "Port I/O/Line/Event#1"
            constraintType: hideSection
            explanation: "Consumer output events do not apply to detector daughterboards."
    metadata:
      notes: "8-block surface-mount occupancy detector daughterboard. Existing Tower-LCC recipe evidence and RR-CirKits detector manuals describe detector outputs as active-low during occupancy."
      channelInputs:
        - channelType: "block-occupancy"
          inputs: [1, 2, 3, 4, 5, 6, 7, 8]
  - daughterboardId: "FOB-A"
    displayName: "FOB-A"
    kind: "breakout"
    metadata:
      notes: "Aux-port fan-out board that may be used per line for either inputs or outputs."
  - daughterboardId: "FOB-C"
    displayName: "FOB-C"
    kind: "breakout"
    metadata:
      notes: "Aux-port fan-out board that may be used per line for either inputs or outputs."
  - daughterboardId: "BOB-S"
    displayName: "BOB-S"
    kind: "breakout"
    metadata:
      notes: "Screw-terminal aux-port breakout board that may be used per line for either inputs or outputs."
  - daughterboardId: "OI-IB-8"
    displayName: "OI-IB-8"
    kind: "input"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        allowedValueLabels: ["No Function"]
        explanation: "Input daughterboards do not use Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        allowedValueLabels: ["Disabled", "Active Hi", "Active Lo", "Alt Action Hi", "Alt Action Lo", "Sample Hi", "Sample Lo", "Alt Sample Hi", "Alt Sample Lo"]
        explanation: "Input daughterboards are limited to Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
        explanation: "Input daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to input daughterboards."
    metadata:
      notes: "8-input opto-isolator board for monitoring external AC or DC sources on RR-CirKits aux-port carriers."
  - daughterboardId: "OI-OB-8"
    displayName: "OI-OB-8"
    kind: "output"
    validityRules:
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0]
        allowedValueLabels: ["Disabled"]
        explanation: "Output daughterboards leave Tower-LCC input modes disabled."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4]
        allowedValueLabels: ["None", "Output State On command", "Output State Off command", "Output On (Function hi)", "Output Off (Function lo)"]
        explanation: "Output-only daughterboards can only send producer indications from output-state or output-function changes."
    metadata:
      notes: "8-bit output expander for RR-CirKits aux-port carriers."
  - daughterboardId: "RB-2"
