schemaVersion: "1.0"
manufacturer: "RR-CirKits"
daughterboards:
  - daughterboardId: "BOD4"
    displayName: "BOD4"
    kind: "mixed-io"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0]
        explanation: "BOD4 local lines 1-4 are detector outputs, so those governed Tower-LCC lines do not drive output functions."
      - targetPath: "Port I/O/Line/Input Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [2]
        explanation: "The BOD-4 detector outputs are low during detection, so local lines 1-4 must use Active Lo input mode."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "BOD4 detector lines can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: hideSection
        explanation: "Consumer output events do not apply to the BOD4 detector lines."
    metadata:
      notes: "4-block occupancy detector plus 4 additional logic-level I/O lines. The shared rules constrain only the detector half of the connector (local lines 1-4)."
  - daughterboardId: "BOD4-CP"
    displayName: "BOD4-CP"
    kind: "mixed-io"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0]
        explanation: "BOD4-CP local lines 1-4 are occupancy detector outputs, so those lines do not drive output functions."
      - targetPath: "Port I/O/Line/Input Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [2]
        explanation: "The BOD4-CP detector half uses active-low occupancy outputs on local lines 1-4."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "BOD4-CP detector lines can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: hideSection
        explanation: "Consumer output events do not apply to the BOD4-CP detector lines."
    metadata:
      notes: "4-block control-point board with 4 detection blocks plus a separate mixed sample/output half. Shared rules constrain the detector half (local lines 1-4) and leave local lines 5-8 available for the board's sampled/output use cases."
  - daughterboardId: "BOD-8-SM"
    displayName: "BOD-8-SM"
    kind: "detection"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Occupancy detector boards do not drive Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [2]
        explanation: "BOD-8 outputs are low during detection, so governed Tower-LCC lines must use Active Lo input mode."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "Detector daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to detector daughterboards."
    metadata:
      notes: "8-block surface-mount occupancy detector daughterboard. Existing Tower-LCC recipe evidence and RR-CirKits detector manuals describe detector outputs as active-low during occupancy."
  - daughterboardId: "FOB-A"
    displayName: "FOB-A"
    kind: "input"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Input daughterboards do not use Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        explanation: "Input daughterboards are limited to Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "Input daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to input daughterboards."
    metadata:
      notes: "Aux-port input board for discrete detectors and contacts."
  - daughterboardId: "FOB-C"
    displayName: "FOB-C"
    kind: "input"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Input daughterboards do not use Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        explanation: "Input daughterboards are limited to Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "Input daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to input daughterboards."
    metadata:
      notes: "Aux-port contact input board."
  - daughterboardId: "BOB-S"
    displayName: "BOB-S"
    kind: "breakout"
    validityRules:
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Signal breakout boards do not expose Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4]
        explanation: "Output-only daughterboards can only send producer indications from output-state or output-function changes."
    metadata:
      notes: "Signal-oriented aux-port breakout board."
  - daughterboardId: "OI-IB-8"
    displayName: "OI-IB-8"
    kind: "input"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Input daughterboards do not use Tower-LCC output functions."
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        explanation: "Input daughterboards are limited to Tower-LCC input modes."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        explanation: "Input daughterboards can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        constraintType: hideSection
        explanation: "Consumer output events do not apply to input daughterboards."
    metadata:
      notes: "8-bit input expander for RR-CirKits aux-port carriers."
  - daughterboardId: "OI-OB-8"
    displayName: "OI-OB-8"
    kind: "output"
    validityRules:
      - targetPath: "Port I/O/Line/Input Function"
        constraintType: allowValues
        allowedValues: [0]
        explanation: "Output daughterboards leave Tower-LCC input modes disabled."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        constraintType: allowValues
        allowedValues: [0, 1, 2, 3, 4]
