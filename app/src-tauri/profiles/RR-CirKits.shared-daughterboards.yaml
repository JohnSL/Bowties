schemaVersion: "1.0"
manufacturer: "RR-CirKits"
daughterboards:
  - daughterboardId: "BOD4"
    displayName: "BOD4"
    kind: "mixed-io"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0]
        allowedValueLabels: ["No Function"]
        explanation: "BOD4 local lines 1-4 are detector outputs, so those governed Tower-LCC lines do not drive output functions."
      - targetPath: "Port I/O/Line/Input Function"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [2]
        allowedValueLabels: ["Active Lo"]
        explanation: "The BOD-4 detector outputs are low during detection, so local lines 1-4 must use Active Lo input mode."
      - targetPath: "Port I/O/Line/Event#2/Upon this action"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: allowValues
        allowedValues: [0, 5, 6, 7, 8]
        allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
        explanation: "BOD4 detector lines can only send producer indications from input transitions or gated input transitions."
      - targetPath: "Port I/O/Line/Event#1"
        lineOrdinals: [1, 2, 3, 4]
        constraintType: hideSection
        explanation: "Consumer output events do not apply to the BOD4 detector lines."
    constraintVariants:
      - variantId: "tower-lcc-c7"
        replaceBaseValidityRules: true
        validityRules:
          - targetPath: "Port I/O/Line/Output Function"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["None"]
            explanation: "BOD4 local lines 1-4 are detector outputs, so those governed Tower-LCC lines do not drive output functions."
          - targetPath: "Port I/O/Line/Input Function"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [1]
            allowedValueLabels: ["Normal"]
            explanation: "The rev-C7 Tower-LCC CDI splits detector polarity from input mode, so BOD4 local lines 1-4 must use Normal input mode."
          - targetPath: "Port I/O/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: hideSection
            explanation: "BOD4 detector lines do not drive commanded outputs, so the command-drive polarity setting is irrelevant."
          - targetPath: "Port I/O/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0]
            allowedValueLabels: ["Low (0V)"]
            explanation: "BOD4 detector outputs are active low, so the producer indication polarity for local lines 1-4 must stay Low (0V)."
          - targetPath: "Port I/O/Line/Event#2/Upon this action"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: allowValues
            allowedValues: [0, 5, 6, 7, 8]
            allowedValueLabels: ["None", "Input On", "Input Off", "Gated On (Non Veto Input)", "Gated Off (Non Veto Input)"]
            explanation: "BOD4 detector lines can only send producer indications from input transitions or gated input transitions."
          - targetPath: "Port I/O/Line/Event#1"
            lineOrdinals: [1, 2, 3, 4]
            constraintType: hideSection
            explanation: "Consumer output events do not apply to the BOD4 detector lines."
    metadata:
      notes: "4-block occupancy detector plus 4 additional logic-level I/O lines. The shared rules constrain only the detector half of the connector (local lines 1-4)."
      channelInputs:
        - channelType: "block-occupancy"
          inputs: [1, 2, 3, 4]
  - daughterboardId: "BOD4-CP"
    displayName: "BOD4-CP"
    kind: "mixed-io"
    validityRules:
      - targetPath: "Port I/O/Line/Output Function"
