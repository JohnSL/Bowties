schemaVersion: "2.0"

nodeType:
  manufacturer: "RR-CirKits"
  model: "Tower-LCC"

# Base event role declarations that apply regardless of selected variant.
#
# Each entry maps a name-based CDI group path (using '/' separators and '#N'
# ordinal suffix for same-named sibling groups, 1-based) to a declared role.
# All eventid leaves inside the matching group — across all replicated instances
# — will receive this role, overriding the protocol-heuristic assignment.
#
# Paths that cannot be resolved in the connected node's CDI are silently skipped
# with a log warning (FR-006).
#
# Node Power Monitor events ('Power OK' and 'Power Not OK') are direct children
# of their segment and are not contained in any group; they cannot be declared
# via groupPath notation and retain their heuristic assignment.

eventRoles:
  # ── Port I/O segment ──────────────────────────────────────────────────────
  # Each Line (16 replications) contains two Event groups (each replicated 6×).
  # Event#1 holds Consumer command events (CDI description: "(C) When this event occurs").
  - groupPath: "Port I/O/Line/Event#1"
    role: Consumer
    label: "Consumer Events"

  # Event#2 holds Producer indication events (CDI description: "(P) this event will be sent").
  - groupPath: "Port I/O/Line/Event#2"
    role: Producer
    label: "Producer Events"

  # ── Conditionals segment ──────────────────────────────────────────────────
  # Each Logic group (32 replications) contains two variable groups and
  # one replicated action group.

  # Variable #1 — two consumer events: "set true" and "set false"
  - groupPath: "Conditionals/Logic/Variable #1"
    role: Consumer

  # Variable #2 — two consumer events: "set true" and "set false"
  - groupPath: "Conditionals/Logic/Variable #2"
    role: Consumer

  # Action#2 — the second group named "Action" within Logic (replication=4).
  # Contains one producer event: "Action Event".
  # (Action#1 is a non-replicated group with no eventid leaves.)
  - groupPath: "Conditionals/Logic/Action#2"
    role: Producer

  # ── Track Receiver segment ────────────────────────────────────────────────
  # Each Circuit (8 replications) contains one consumer event: "Link Address".
  - groupPath: "Track Receiver/Circuit"
    role: Consumer

  # ── Track Transmitter segment ─────────────────────────────────────────────
  # Each Circuit (8 replications) contains one producer event: "Link Address".
  - groupPath: "Track Transmitter/Circuit"
    role: Producer

relevanceRules: []

# Configuration Modes (v2)
#
# Three modes are declared:
#   1. `firmware-revision` — CDI-signature auto-detect choosing between
#      the legacy Tower-LCC firmware and the rev-C7 redesign. The chosen
#      variant gates which shared-daughterboard validity rules apply
#      (legacy = `validityRules`, c7 = `constraintVariants["tower-lcc-c7"]`).
#   2. `connector-a` — structural slot for the first carrier connector.
#   3. `connector-b` — structural slot for the second carrier connector.
#
# Daughterboard display names, descriptions, and per-variant validity rules
# live in `RR-CirKits.shared-daughterboards.yaml`. The variants below carry
# empty overlays because they only declare *which* boards are valid in each
# slot — the rich rules come from the shared library, keyed by daughterboard
# id and the active firmware variant.

configurationModes:
  - id: "firmware-revision"
    label: "Firmware revision"
    selector:
      kind: "cdiSignature"
      variantsSignature:
        - variantId: "tower-lcc-legacy"
          signature:
            requiredPaths:
              - "Port I/O/Line/Output Function"
              - "Port I/O/Line/Input Function"
            enumEntryCounts:
              - path: "Port I/O/Line/Output Function"
                count: 17
              - path: "Port I/O/Line/Input Function"
                count: 9
        - variantId: "tower-lcc-c7"
          signature:
            requiredPaths:
              - "Port I/O/Line/Output Function"
              - "Port I/O/Line/Receiving the configured Command (C) event(s) will drive or pulse the line:"
              - "Port I/O/Line/Input Function"
              - "Port I/O/Line/The configured Indication (P) event(s) will be sent when the line is driven:"
            enumEntryCounts:
              - path: "Port I/O/Line/Output Function"
                count: 5
              - path: "Port I/O/Line/Input Function"
                count: 3
    variants:
      - id: "tower-lcc-legacy"
        label: "Legacy firmware"
        overlay: {}
      - id: "tower-lcc-c7"
        label: "Rev-C7 firmware"
        overlay: {}

  - id: "connector-a"
    label: "Connector A"
    selector:
      kind: "structuralSlot"
      slotId: "connector-a"
      slotLabel: "Connector A"
      slotOrder: 0
      affectedPaths:
        - "Port I/O/Line#1"
        - "Port I/O/Line#2"
        - "Port I/O/Line#3"
        - "Port I/O/Line#4"
        - "Port I/O/Line#5"
        - "Port I/O/Line#6"
        - "Port I/O/Line#7"
        - "Port I/O/Line#8"
      allowNoneInstalled: true
    variants:
